name: Core Web Vitals

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  lighthouse:
    name: Lighthouse performance gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Build for production
        run: npm run build

      - name: Start server
        run: |
          node .output/server/index.mjs &
          echo $! > server.pid
          npx wait-on http://localhost:3000 --timeout 60000

      - name: Run Lighthouse CI
        id: lhci
        run: npx @lhci/cli@0.14.x autorun --config=./lighthouserc.json
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}
        continue-on-error: true

      - name: Stop server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true

      - name: Publish Lighthouse scores to job summary and README
        if: always()
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/update-readme-lighthouse.mjs >> "$GITHUB_STEP_SUMMARY"

      - name: Commit updated README
        if: always()
        run: |
          if ! git diff --quiet -- README.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update Lighthouse scores [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "No README changes to commit."
          fi

      - name: Fail the build if Lighthouse CI failed
        if: steps.lhci.outcome == 'failure'
        run: exit 1